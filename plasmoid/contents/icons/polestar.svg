<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aaccff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond circulaire -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#2a4080" stroke-width="0.5"/>

  <!-- Logo Polestar: étoile à 4 branches -->
  <polygon points="16,16 2,14 2,18" fill="url(#star)" opacity="0.95"/>
  <polygon points="16,16 30,14 30,18" fill="url(#star)" opacity="0.95"/>
  <polygon points="16,16 14,2 18,2" fill="url(#star)" opacity="0.95"/>
  <polygon points="16,16 14,30 18,30" fill="url(#star)" opacity="0.95"/>

  <!-- Centre lumineux -->
  <circle cx="16" cy="16" r="2" fill="white" opacity="0.9"/>
</svg>
